name: Build Plugins

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew ExampleProvider:make --stacktrace

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StreamIMDB-Plugin
          path: "**/*.cs3"
